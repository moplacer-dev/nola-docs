<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOLA Docs - Document Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header Section -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 py-8">
            <div class="flex justify-between items-center">
            <div class="text-left">
                <h1 class="text-5xl font-bold text-gray-900 mb-2">NOLA.docs</h1>
            </div>
            <div class="text-right">
                <a href="/about" class="bg-blue-600 text-white px-4 py-3 rounded-lg hover:bg-blue-700 transition-colors text-center">
                    Doc It Like It's Hot
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto py-12 px-4">
        <div class="text-left mb-8">
            <h2 class="text-2xl font-semibold text-gray-00 mb-2">Select a Document Type</h2>
        </div>

        <div class="bg-white rounded-lg shadow-md p-8">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                <a href="/create-vocabulary" class="bg-red-700 text-white px-4 py-3 rounded-lg hover:bg-red-800 transition-colors text-center">
                    Create Vocabulary Worksheet
                </a>
                <a href="/create-pba" class="bg-orange-500 text-white px-4 py-3 rounded-lg hover:bg-orange-600 transition-colors text-center">
                    Create PBA Worksheet
                </a>
                <a href="/create-test" class="bg-yellow-500 text-white px-4 py-3 rounded-lg hover:bg-yellow-600 transition-colors text-center">
                    Create Test Worksheet
                </a>
                <a href="/create-generic" class="bg-green-700 text-white px-4 py-3 rounded-lg hover:bg-green-800 transition-colors text-center">
                    Create Generic Worksheet
                </a>
                <a href="/create-familybriefing" class="bg-blue-700 text-white px-4 py-3 rounded-lg hover:bg-blue-800 transition-colors text-center">
                    Create Family Briefing
                </a>
                <a href="/create-rca" class="bg-purple-700 text-white px-4 py-3 rounded-lg hover:bg-purple-800 transition-colors text-center">
                    Create RCA Worksheet
                </a>
                <a href="/create-moduleGuide" class="bg-cyan-600 text-white px-4 py-3 rounded-lg hover:bg-cyan-700 transition-colors text-center">
                    Create Module Guide
                </a>
                <a href="/create-moduleAnswerKey" class="bg-teal-700 text-white px-4 py-3 rounded-lg hover:bg-teal-800 transition-colors text-center">
                    Create Module Answer Key
                </a>
                <a href="/create-moduleActivitySheet" class="bg-gray-700 text-white px-4 py-3 rounded-lg hover:bg-gray-800 transition-colors text-center">
                    Create Module Activity Sheet
                </a>
            </div>
        </div>
    </main>
</body>
</html>
