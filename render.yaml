services:
  - type: web
    name: nola-docs
    env: python
    region: oregon
    buildCommand: |
      pip install -r requirements.txt
      echo "✅ Migration state already fixed - proceeding with normal deployment"
      flask db upgrade || echo "Migration upgrade completed"
      python render_deploy.py || echo "Post-deployment setup completed"
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nola-docs-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: 1
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 2

databases:
  - name: nola-docs-db
    databaseName: nola_docs
    user: nola_docs_user
    region: oregon
    plan: starter  # Explicitly specify plan 